version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: restaurant-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: jesusjoeun_db_user
      MONGO_INITDB_ROOT_PASSWORD: q1w2e3r4
      MONGO_INITDB_DATABASE: restaurant-menu-manager

    volumes:
      - mongodb_data:/data/db
    networks:
      - restaurant-network

  server:
    build: ./server
    container_name: restaurant-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/restaurant-manager?authSource=admin
      - PORT=5000
      - CLIENT_URL=https://your-app.vercel.app
    depends_on:
      - mongodb
    networks:
      - restaurant-network

  client:
    build: ./client
    container_name: restaurant-client
    restart: always
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_SERVER_URL=https://your-server.com
    depends_on:
      - server
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  mongodb_data:
